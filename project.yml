name: Trackr
options:
  bundleIdPrefix: com.jingxue
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "18"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Apple Developer Team ID — drives code signing for all targets.
    # Found at https://developer.apple.com/account → Membership details.
    DEVELOPMENT_TEAM: Y5NK4T6CXG
    # Let Xcode manage provisioning automatically (development + distribution).
    CODE_SIGN_STYLE: Automatic

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.15.0"

targets:
  Trackr:
    type: application
    platform: iOS
    sources:
      - path: Trackr
        excludes:
          - "Resources/presets.bundled.json"
          - "Resources/Localizable.xcstrings"
          - "Resources/fx-fallback.json"
      - path: Trackr/Resources/presets.bundled.json
        buildPhase: resources
      - path: Trackr/Resources/Localizable.xcstrings
        buildPhase: resources
      - path: Trackr/Resources/fx-fallback.json
        buildPhase: resources
    dependencies:
      - target: Widgets
    info:
      path: Trackr/Info.plist
      properties:
        CFBundleDisplayName: PennyLoop
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIAppFonts:
          - VT323-Regular.ttf
        # Required by App Store validation. iPhone-only + portrait-only.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Permanent answer to ASC's "App 加密文稿" prompt: we only use
        # Apple's built-in HTTPS/TLS via URLSession (and Apple-handled
        # StoreKit + CloudKit). Exempt from US export compliance —
        # setting this to `false` tells ASC to stop asking every build.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jingxue.pennyloop
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        CODE_SIGN_ENTITLEMENTS: Trackr.entitlements

  TrackrTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TrackrTests
        excludes:
          - "**/__Snapshots__/**"
    dependencies:
      - target: Trackr
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jingxue.pennyloop.tests
        GENERATE_INFOPLIST_FILE: YES

  Widgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Trackr/Core
      - path: Trackr/DesignSystem
      - path: Trackr/Features/Widget
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: PennyLoop Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jingxue.pennyloop.widgets
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: Widgets.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: "PennyLoop Widgets"

schemes:
  Trackr:
    build:
      targets:
        Trackr: all
        TrackrTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Configuration.storekit
    test:
      config: Debug
      targets:
        - TrackrTests
      storeKitConfiguration: Configuration.storekit
