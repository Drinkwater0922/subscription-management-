name: Trackr
options:
  bundleIdPrefix: com.placeholder
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.15.0"

targets:
  Trackr:
    type: application
    platform: iOS
    sources:
      - path: Trackr
      - path: Trackr/Resources/presets.bundled.json
        buildPhase: resources
    dependencies:
      - target: Widgets
    info:
      path: Trackr/Info.plist
      properties:
        CFBundleDisplayName: Trackr
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIAppFonts:
          - VT323-Regular.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.trackr
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        CODE_SIGN_ENTITLEMENTS: Trackr.entitlements

  TrackrTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TrackrTests
    dependencies:
      - target: Trackr
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.trackr.tests
        GENERATE_INFOPLIST_FILE: YES

  Widgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Trackr/Core
      - path: Trackr/Features/Widget
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Trackr Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.trackr.widgets
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: Widgets.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: "Trackr Widgets"

schemes:
  Trackr:
    build:
      targets:
        Trackr: all
        TrackrTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Configuration.storekit
    test:
      config: Debug
      targets:
        - TrackrTests
      storeKitConfiguration: Configuration.storekit
